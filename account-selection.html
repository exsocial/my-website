<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Account - exsocial</title>
    <style>
        body {
            margin: 0;
            background-color: #050505;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        h2 { margin-bottom: 2rem; font-size: 1.8rem; }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            width: 300px;
        }

        .btn {
            padding: 15px;
            font-size: 1.1rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 8px;
            text-align: center;
            transition: all 0.3s ease;
            display: block;
        }

        .btn-free {
            background-color: transparent;
            color: #ffffff;
            border: 2px solid #ffffff;
        }

        .btn-creator {
            background-color: #ffffff;
            color: #000;
            border: 2px solid #ffffff;
        }

        /* Small text for the fee */
        .fee-text {
            font-size: 0.75rem;
            font-weight: 400;
            margin-top: 5px;
            opacity: 0.8;
        }

        .back-link { margin-top: 2rem; color: #888; text-decoration: none; }
    </style>
</head>
<body>

    <h2>Choose Account Type</h2>
    
    <div class="button-group">
        <a href="signup.html?type=free" class="btn btn-free">Free User Account</a>
        
        <a href="signup.html?type=creator" class="btn btn-creator">
            Creator Earning Account
            <div class="fee-text">Registration Fee: N20,000</div>
        </a>
    </div>

    <a href="index.html" class="back-link">← Back</a>

</body>
</html>
