<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - exsocial</title>
    <style>
        body { 
            background-color: #050505; 
            color: #ffffff; 
            font-family: sans-serif; 
            margin: 0; 
            overflow-x: hidden; /* Prevents menu from causing layout shift */
        }
        header { 
            padding: 1.5rem; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid #222; 
        }
        .logo { font-weight: bold; font-size: 1.5rem; }
        .menu-btn { cursor: pointer; color: #fff; font-size: 1rem; }
        
        /* Sidebar container */
        .sidebar { 
            height: 100vh; 
            width: 250px; 
            position: fixed; 
            top: 0; 
            right: -250px; /* Hidden off-screen */
            background: #050505; 
            border-left: 1px solid #333; 
            transition: 0.3s; 
            padding: 2rem; 
            z-index: 1000; 
        }
        .sidebar.active { right: 0; } /* Slide into view */
        
        .sidebar a { 
            display: block; 
            color: #fff; 
            padding: 15px 0; 
            text-decoration: none; 
            font-size: 1.2rem; 
        }
        .sidebar .close-btn { 
            cursor: pointer; 
            color: #888; 
            margin-bottom: 2rem; 
            font-size: 1rem; 
        }
        main { padding: 2rem; }
    </style>
</head>
<body>

    <header>
        <div class="logo">exsocial</div>
        <div class="menu-btn" onclick="toggleMenu()">☰ Menu</div>
    </header>

    <div id="sidebar" class="sidebar">
        <div class="close-btn" onclick="toggleMenu()">✕ Close</div>
        <a href="home.html">Home</a>
        <a href="inbox.html">Inbox</a>
        <a href="create.html">Make a Post</a>
        <a href="briefs.html">Briefs</a>
        <a href="orders.html">Manage Orders</a>
        <a href="orders-list.html">Order Lists</a>
        <a href="categories.html">Browse Categories</a>
        <a href="profile.html">My Profile</a>
    </div>

    <main>
        <h1>Dashboard</h1>
        <p>Welcome back! Use the menu above to navigate.</p>
    </main>

    <script>
        function toggleMenu() {
            document.getElementById("sidebar").classList.toggle("active");
        }
    </script>
</body>
</html>
