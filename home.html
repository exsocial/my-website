<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - exsocial</title>
    <style>
        body { background-color: #050505; color: #ffffff; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        /* Top Navigation Bar */
        nav { padding: 1rem 2rem; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: bold; font-size: 1.5rem; }
        
        /* Main Feed Area */
        main { flex: 1; padding: 2rem; display: flex; justify-content: center; }
        .feed-placeholder { border: 1px dashed #333; width: 100%; max-width: 600px; display: flex; align-items: center; justify-content: center; color: #666; border-radius: 8px; }
        
        /* Logout Link */
        .logout { color: #888; text-decoration: none; font-size: 0.9rem; }
        .logout:hover { color: #fff; }
    </style>
</head>
<body>
    <nav>
        <div class="logo">exsocial</div>
        <a href="index.html" class="logout">Logout</a>
    </nav>
    <main>
        <div class="feed-placeholder">Your user feed will appear here.</div>
    </main>
</body>
</html>
