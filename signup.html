<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - exsocial</title>
    <style>
        body { background-color: #050505; color: #ffffff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        h1 { margin-bottom: 2rem; }
        form { display: flex; flex-direction: column; gap: 1rem; width: 300px; }
        input { padding: 12px; border-radius: 8px; border: 1px solid #333; background: #111; color: white; }
        button { padding: 12px; border-radius: 8px; border: none; background: #fff; cursor: pointer; font-weight: bold; color: #000; font-size: 1rem; }
        a { color: #888; text-decoration: none; margin-top: 1rem; font-size: 0.9rem; }
    </style>
</head>
<body>
    <h1>Create Account</h1>
    <form>
        <input type="text" placeholder="Username" required>
        <input type="email" placeholder="Email" required>
        <input type="password" placeholder="Create Password" required>
        <input type="password" placeholder="Retype Password" required>
        <button type="submit">Sign Up</button>
    </form>
    <a href="index.html">← Back to Home</a>
</body>
</html>
