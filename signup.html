<body>
    <h1>Create Account</h1>
    <form id="signupForm">
        <input type="hidden" id="accountType" name="accountType">
        <input type="text" placeholder="Username" required>
        <input type="email" placeholder="Email" required>
        <input type="password" placeholder="Create Password" required>
        
        <button type="submit" class="btn-link" id="submitBtn">Sign Up</button>
    </form>

    <script>
        // Get the type from the URL
        const params = new URLSearchParams(window.location.search);
        const type = params.get('type');
        document.getElementById('accountType').value = type;

        // Logic to handle redirection based on account type
        document.getElementById('signupForm').addEventListener('submit', function(e) {
            e.preventDefault();
            if (type === 'creator') {
                alert("Redirecting to payment gateway for N20,000 fee...");
                // Here you would link to your Payment Gateway (e.g., Paystack/Flutterwave)
            } else {
                window.location.href = "dashboard.html";
            }
        });
    </script>
    <a href="account-selection.html">← Back</a>
</body>
